apiVersion: batch/v1
kind: Job
metadata:
  name: art-evaluate-job
  namespace: ksho1003
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      containers:
        - name: art-evaluate
          image: ksho6/art-recommender:v2
          imagePullPolicy: Always
          command: ["python", "src/6_evaluate.py"]
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          env:
            - name: WANDB_API_KEY
              value: ""  # fill in your W&B API key before applying
            - name: DATA_DIR
              value: "/app/data"
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
      restartPolicy: Never
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: dsw-pvc
